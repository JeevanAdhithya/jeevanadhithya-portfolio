<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resend Email Test</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:400px;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}
input,textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:12px;
    background:#0070f3;
    color:#fff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#005ad1;
}
#status{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Send Email</h2>

<input type="email" id="to" placeholder="Recipient Email">

<input type="text" id="subject" placeholder="Subject">

<textarea id="message" rows="6" placeholder="Message"></textarea>

<button onclick="sendEmail()">Send</button>

<p id="status"></p>

</div>

<script>

const API_KEY = "re_YYK6gP9d_JYUGLGDni8yCPQZrQN7xHMax";

async function sendEmail(){

const to=document.getElementById("to").value;
const subject=document.getElementById("subject").value;
const message=document.getElementById("message").value;

document.getElementById("status").innerHTML="Sending...";

try{

const response=await fetch("https://api.resend.com/emails",{

method:"POST",

headers:{
"Authorization":"Bearer "+API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({

from:"Portfolio <noreply@jeevanadhithya.qzz.io>",
to:[to],
subject:subject,
html:`<h2>${subject}</h2><p>${message}</p>`

})

});

const data=await response.json();

if(response.ok){

document.getElementById("status").innerHTML="✅ Email Sent";
console.log(data);

}else{

document.getElementById("status").innerHTML="❌ "+JSON.stringify(data);
console.log(data);

}

}catch(err){

document.getElementById("status").innerHTML="❌ "+err.message;

}

}

</script>

</body>
</html>
